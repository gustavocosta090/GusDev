<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auron — Equipamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@200;300;400;500;600&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shell.css">
<style>
  .equip-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .equip-toolbar .cat-tabs{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
  .equip-toolbar input.busca{max-width:300px;}
  .cat-tab{padding:6px 13px;border:1px solid rgba(200,169,110,.25);background:transparent;color:var(--gray);
    font-family:'Jost',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .2s;}
  .cat-tab.active{background:var(--accent);color:var(--dark);border-color:var(--accent);font-weight:600;}
  .equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .equip-card{background:var(--dark2);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
  .equip-card .ec-img{width:100%;height:150px;object-fit:cover;background:var(--dark3);display:block;}
  .equip-card .ec-img-ph{width:100%;height:150px;background:var(--dark3);display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:34px;}
  .equip-card .ec-body{padding:13px 14px;flex:1;display:flex;flex-direction:column;gap:5px;}
  .equip-card .ec-name{font-size:13px;color:var(--white);font-weight:500;line-height:1.3;}
  .equip-card .ec-cat{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);}
  .equip-card .ec-desc{font-size:11px;color:var(--gray);line-height:1.5;}
  .equip-card .ec-price{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--accent2);margin-top:auto;}
  .equip-card .ec-actions{display:flex;gap:6px;padding:0 14px 13px;}
  .ec-tag{display:inline-block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:rgba(200,169,110,.15);color:var(--accent);}
  .ec-tag.serv{background:rgba(45,122,58,.18);color:#7fd18c;}
  .upload-box{border:1px dashed rgba(200,169,110,.3);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
  .upload-box:hover{border-color:var(--accent);background:rgba(200,169,110,.05);}
  .upload-box input{display:none;}
  #m-foto-preview{max-height:140px;border-radius:6px;margin-top:10px;display:none;margin-left:auto;margin-right:auto;}
</style>
</head>
<body>
<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Equipamentos</div>
      <div class="page-sub">Catalogo de produtos e servicos</div>
    </div>
    <button class="btn btn-primary" onclick="novoEquip()">+ Novo equipamento</button>
  </div>

  <div class="equip-toolbar">
    <input class="busca" id="busca" type="text" placeholder="Buscar por nome ou descricao..." oninput="renderEquip()">
    <div class="cat-tabs" id="cat-filter">
      <button class="cat-tab active" data-cat="">Todos</button>
      <button class="cat-tab" data-cat="seguranca">Seguranca</button>
      <button class="cat-tab" data-cat="automacao">Automacao</button>
      <button class="cat-tab" data-cat="som">Audio</button>
      <button class="cat-tab" data-cat="rede">Rede</button>
      <button class="cat-tab" data-cat="outros">Outros</button>
      <button class="cat-tab" data-cat="__serv">Servicos</button>
    </div>
  </div>
  <div class="equip-grid" id="equip-grid"></div>
</div>

<!-- MODAL EQUIPAMENTO -->
<div class="modal-overlay" id="modal-equip">
  <div class="modal">
    <div class="modal-head">
      <h3 id="m-title">Novo equipamento</h3>
      <button class="modal-close" onclick="closeModal('modal-equip')">&times;</button>
    </div>
    <div class="field-group">
      <input type="hidden" id="m-id">
      <div><label>Nome</label><input id="m-nome" type="text" placeholder="Ex: Camera Intelbras 1230 Dome"></div>
      <div class="two-col">
        <div><label>Tipo</label>
          <select id="m-tipo">
            <option value="produto">Produto (equipamento)</option>
            <option value="servico">Servico (mao de obra / instalacao)</option>
          </select>
        </div>
        <div><label>Categoria</label>
          <select id="m-cat">
            <option value="seguranca">Seguranca</option>
            <option value="automacao">Automacao</option>
            <option value="som">Audio</option>
            <option value="rede">Rede</option>
            <option value="outros">Outros</option>
          </select>
        </div>
      </div>
      <div><label>Preco (R$)</label><input id="m-preco" type="number" min="0" step="0.01" placeholder="0,00"></div>
      <div><label>Descricao</label><textarea id="m-desc" placeholder="Especificacoes..."></textarea></div>
      <div>
        <label>Foto</label>
        <label class="upload-box" for="m-foto-input">
          <input type="file" id="m-foto-input" accept="image/*" onchange="onFotoSel(this)">
          <span class="muted" id="m-foto-hint">Clique para escolher uma imagem</span>
          <img id="m-foto-preview" alt="preview">
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-gold btn-block" id="m-save" onclick="salvarEquip()">Salvar</button>
        <button class="btn btn-danger" id="m-del" onclick="excluirEquip()" style="display:none;">Excluir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="utils.js"></script>
<script>
let equipamentos = [];
let filtroCat = '';
let fotoNovaBlob = null;
let fotoAtualUrl = '';

(async function init(){
  await renderTopbar('equipamentos');
  await carregarEquip();
})();

async function carregarEquip(){
  const { data, error } = await db.from('equipamentos').select('*').eq('ativo',true).order('nome');
  if(error){ showToast('Erro ao carregar equipamentos', true); return; }
  equipamentos = data || [];
  renderEquip();
}

document.querySelectorAll('#cat-filter .cat-tab').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#cat-filter .cat-tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    filtroCat = b.dataset.cat;
    renderEquip();
  });
});

function renderEquip(){
  const grid = document.getElementById('equip-grid');
  const q = document.getElementById('busca').value.trim().toLowerCase();
  let lista = equipamentos;
  if(filtroCat==='__serv') lista = lista.filter(e=>e.tipo==='servico');
  else if(filtroCat)       lista = lista.filter(e=>e.categoria===filtroCat);
  if(q){
    lista = lista.filter(e =>
      (e.nome||'').toLowerCase().includes(q) ||
      (e.descricao||'').toLowerCase().includes(q));
  }
  if(!lista.length){ grid.innerHTML = '<div class="empty"><p>Nenhum equipamento encontrado</p></div>'; return; }
  grid.innerHTML = lista.map(e=>{
    const serv = e.tipo==='servico';
    return `<div class="equip-card">
      ${e.foto_url ? `<img class="ec-img" src="${e.foto_url}" alt="${e.nome}">` : `<div class="ec-img-ph">&#128247;</div>`}
      <div class="ec-body">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
          <span class="ec-cat">${e.categoria||''}</span>
          <span class="ec-tag ${serv?'serv':''}">${serv?'Servico':'Produto'}</span>
        </div>
        <div class="ec-name">${e.nome}</div>
        ${e.descricao?`<div class="ec-desc">${e.descricao}</div>`:''}
        ${e.preco?`<div class="ec-price">${fmtBRL(e.preco)}</div>`:''}
      </div>
      <div class="ec-actions">
        <button class="btn btn-ghost btn-sm btn-block" onclick="editarEquip(${e.id})">Editar</button>
      </div>
    </div>`;
  }).join('');
}

function novoEquip(){
  document.getElementById('m-title').textContent = 'Novo equipamento';
  document.getElementById('m-id').value = '';
  document.getElementById('m-nome').value = '';
  document.getElementById('m-tipo').value = 'produto';
  document.getElementById('m-cat').value = (filtroCat && filtroCat!=='__serv') ? filtroCat : 'seguranca';
  document.getElementById('m-preco').value = '';
  document.getElementById('m-desc').value = '';
  resetFoto();
  document.getElementById('m-del').style.display = 'none';
  openModal('modal-equip');
}

function editarEquip(id){
  const e = equipamentos.find(x=>x.id===id);
  if(!e) return;
  document.getElementById('m-title').textContent = 'Editar equipamento';
  document.getElementById('m-id').value = e.id;
  document.getElementById('m-nome').value = e.nome || '';
  document.getElementById('m-tipo').value = e.tipo || 'produto';
  document.getElementById('m-cat').value = e.categoria || 'outros';
  document.getElementById('m-preco').value = e.preco || '';
  document.getElementById('m-desc').value = e.descricao || '';
  resetFoto();
  fotoAtualUrl = e.foto_url || '';
  if(fotoAtualUrl){
    const pv = document.getElementById('m-foto-preview');
    pv.src = fotoAtualUrl; pv.style.display = 'block';
    document.getElementById('m-foto-hint').textContent = 'Trocar foto';
  }
  document.getElementById('m-del').style.display = 'block';
  openModal('modal-equip');
}

function resetFoto(){
  fotoNovaBlob = null; fotoAtualUrl = '';
  const pv = document.getElementById('m-foto-preview');
  pv.src = ''; pv.style.display = 'none';
  document.getElementById('m-foto-input').value = '';
  document.getElementById('m-foto-hint').textContent = 'Clique para escolher uma imagem';
}

function onFotoSel(input){
  const file = input.files[0];
  if(!file) return;
  fotoNovaBlob = file;
  const reader = new FileReader();
  reader.onload = e => {
    const pv = document.getElementById('m-foto-preview');
    pv.src = e.target.result; pv.style.display = 'block';
    document.getElementById('m-foto-hint').textContent = 'Trocar foto';
  };
  reader.readAsDataURL(file);
}

async function salvarEquip(){
  const nome = document.getElementById('m-nome').value.trim();
  if(!nome){ showToast('Informe o nome.', true); return; }
  const btn = document.getElementById('m-save');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try{
    let fotoUrl = fotoAtualUrl;
    if(fotoNovaBlob){ fotoUrl = await uploadFotoEquip(fotoNovaBlob); }
    const reg = {
      nome,
      tipo: document.getElementById('m-tipo').value,
      categoria: document.getElementById('m-cat').value,
      preco: parseFloat(document.getElementById('m-preco').value) || null,
      descricao: document.getElementById('m-desc').value.trim() || null,
      foto_url: fotoUrl || null,
      atualizado_em: new Date().toISOString(),
    };
    const id = document.getElementById('m-id').value;
    let res;
    if(id){ res = await db.from('equipamentos').update(reg).eq('id', id); }
    else  { res = await db.from('equipamentos').insert(reg); }
    if(res.error) throw res.error;
    showToast('Equipamento salvo.');
    closeModal('modal-equip');
    await carregarEquip();
  }catch(err){
    showToast('Erro ao salvar: ' + (err.message||err), true);
  }finally{
    btn.disabled = false; btn.textContent = 'Salvar';
  }
}

async function excluirEquip(){
  const id = document.getElementById('m-id').value;
  if(!id) return;
  if(!confirm('Excluir este equipamento?')) return;
  const { error } = await db.from('equipamentos').update({ ativo:false, atualizado_em:new Date().toISOString() }).eq('id', id);
  if(error){ showToast('Erro ao excluir.', true); return; }
  showToast('Equipamento removido.');
  closeModal('modal-equip');
  await carregarEquip();
}
</script>
</body>
</html>
